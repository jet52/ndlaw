# Apache 2.4 vhost — PUBLIC unauthenticated MCP endpoint at ndlaw.org.
#
# Companion to mcp-apache.conf (the capability-URL deployment): both proxy
# the same localhost backend; this vhost is open to everyone. Overload
# protection is layered OUTSIDE this file:
#   - fail2ban jails on this vhost's access log (jail.d/apache-ndlaw.conf):
#     per-IP request-rate throttle bans — Apache itself has no usable
#     request-rate limiter (mod_ratelimit is bandwidth-only, mod_qos is not
#     in Ubuntu 24.04, mod_evasive is unreliable under prefork).
#   - systemd resource caps on ndcourts-mcp.service
#     (ndcourts-mcp-resources.conf): MemoryHigh/MemoryMax backstop.
#   - ProxyTimeout + LimitRequestBody here bound each request.
# Only /mcp reaches the app; / serves a static landing page (cheap for
# bots, connection instructions for humans).
#
# Install:
#   1. sudo cp deploy/ndlaw-apache.conf /etc/apache2/sites-available/ndlaw.org.conf
#   2. sudo mkdir -p /var/www/ndlaw.org && sudo cp deploy/ndlaw-landing/* /var/www/ndlaw.org/
#   3. sudo a2ensite ndlaw.org && sudo systemctl reload apache2
#   4. sudo certbot certonly --apache -d ndlaw.org -d www.ndlaw.org
#   5. sudo systemctl reload apache2   # activates the <IfFile>-gated :443 block
#   6. Install the fail2ban filter+jail (see deploy/fail2ban/) and the
#      systemd override, then restart fail2ban.

<VirtualHost *:80>
    ServerName ndlaw.org
    ServerAlias www.ndlaw.org
    DocumentRoot /var/www/ndlaw.org

    RewriteEngine on
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://ndlaw.org%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfFile "/etc/letsencrypt/live/ndlaw.org/fullchain.pem">
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName ndlaw.org
    ServerAlias www.ndlaw.org

    # Canonicalize www → apex.
    RewriteEngine on
    RewriteCond %{HTTP_HOST} ^www\. [NC]
    RewriteRule ^ https://ndlaw.org%{REQUEST_URI} [END,NE,R=permanent]

    ErrorLog  ${APACHE_LOG_DIR}/ndlaw.org-error.log
    CustomLog ${APACHE_LOG_DIR}/ndlaw.org-access.log combined

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile    /etc/letsencrypt/live/ndlaw.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/ndlaw.org/privkey.pem

    # Static landing page + robots at /; only /mcp is proxied.
    DocumentRoot /var/www/ndlaw.org
    <Directory /var/www/ndlaw.org>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    ProxyRequests Off
    ProxyPreserveHost On
    # Bounds how long an abandoned stream can pin a prefork worker.
    ProxyTimeout 120

    <Location /mcp>
        ProxyPass        http://127.0.0.1:8000/mcp flushpackets=on
        ProxyPassReverse http://127.0.0.1:8000/mcp

        # MCP can return text/event-stream; defeat buffering & compression
        # so SSE chunks reach the client as they're produced.
        SetEnv proxy-sendchunked 1
        RequestHeader unset Accept-Encoding
        Header set X-Accel-Buffering "no"
    </Location>

    # JSON-RPC payloads are tiny.
    LimitRequestBody 262144
</VirtualHost>
</IfModule>
</IfFile>

# vim: syntax=apache ts=4 sw=4 sts=4 sr noet

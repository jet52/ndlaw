# fail2ban jails for the PUBLIC ndlaw.org MCP endpoint (unauthenticated).
# Install to /etc/fail2ban/jail.d/apache-ndlaw.conf, then:
#     sudo systemctl restart fail2ban
#
# Three layers (all per-IP; bans are throttles, not blocklists):
#   apache-ndlaw-rate   — 60 successful /mcp requests per minute. One real
#                         MCP session peaks ~35 req/min; public strangers
#                         do not share a NAT the way the court users on
#                         mcp.ndconst.org do, so the cap is per-user-ish.
#                         Short ban = "slow down".
#   apache-ndlaw-burst  — 900 /mcp requests per 15 minutes: catches
#                         sustained crawlers pacing just under the per-
#                         minute cap. Longer ban.
#   apache-ndlaw-junk   — scanner noise (400/403/404/408). The landing
#                         page absorbs most bot probes at /, so repeated
#                         junk here is deliberate scanning.
#
# The connected-client instructions (server.py NDCOURTS_RATE_NOTE) tell
# LLM clients to stay under these caps; keep the two in sync if retuned.
#
# Check:  sudo fail2ban-client status apache-ndlaw-rate
# Unban:  sudo fail2ban-client set apache-ndlaw-rate unbanip <IP>

[apache-ndlaw-rate]
enabled  = true
port     = http,https
filter   = apache-ndlaw-mcp
logpath  = /var/log/apache2/ndlaw.org-access.log
maxretry = 60
findtime = 1m
bantime  = 10m

[apache-ndlaw-burst]
enabled  = true
port     = http,https
filter   = apache-ndlaw-mcp
logpath  = /var/log/apache2/ndlaw.org-access.log
maxretry = 900
findtime = 15m
bantime  = 1h

[apache-ndlaw-junk]
enabled  = true
port     = http,https
filter   = apache-mcp-junk
logpath  = /var/log/apache2/ndlaw.org-access.log
maxretry = 30
findtime = 10m
bantime  = 6h

# fail2ban jail — ban IPs that repeatedly fail Basic Auth.
# Install to /etc/fail2ban/jail.d/caddy-ndcourts.conf, then:
#   sudo systemctl restart fail2ban
#
# Uses fail2ban's default ban action (nftables/iptables), which coexists
# with ufw. Check status with:  sudo fail2ban-client status caddy-ndcourts

[caddy-ndcourts]
enabled  = true
port     = http,https
filter   = caddy-ndcourts
logpath  = /var/log/caddy/ndcourts-mcp.log
maxretry = 5
findtime = 10m
bantime  = 1h

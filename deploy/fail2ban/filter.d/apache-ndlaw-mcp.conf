# fail2ban filter — successful (2xx) requests to the PUBLIC /mcp endpoint
# on ndlaw.org. Landing-page and robots hits deliberately do NOT match, so
# the paired jails throttle only real MCP traffic.
# Install to /etc/fail2ban/filter.d/apache-ndlaw-mcp.conf

[Definition]
failregex = ^<HOST> \S+ \S+ \[[^\]]+\] "[A-Z]+ /mcp[^"]*" 2\d\d \d+
ignoreregex =

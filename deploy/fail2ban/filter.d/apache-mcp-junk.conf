# fail2ban filter — bot/scanner junk against the Apache MCP vhost.
# Matches requests refused at Apache without reaching the app:
#   403  anything outside the secret path (deny-all <Location />)
#   404  missing paths
#   400  malformed requests
#   408  connections opened with no request sent (the request field is "-")
# Install to /etc/fail2ban/filter.d/apache-mcp-junk.conf

[Definition]
failregex = ^<HOST> \S+ \S+ \[[^\]]+\] "[^"]*" (?:400|403|404|408) \d+
ignoreregex =

# fail2ban filter — counts SUCCESSFUL (2xx) requests to the Apache MCP
# vhost, so the paired jail acts as a per-IP request-rate cap on real
# traffic (clients that have the URL). Junk never matches here; it is
# handled by apache-mcp-junk.
# Install to /etc/fail2ban/filter.d/apache-mcp-rate.conf

[Definition]
failregex = ^<HOST> \S+ \S+ \[[^\]]+\] "[^"]*" 2\d\d \d+
ignoreregex =

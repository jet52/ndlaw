# fail2ban filter — matches failed Basic Auth (HTTP 401) in Caddy's JSON
# access log. Install to /etc/fail2ban/filter.d/caddy-ndcourts.conf
#
# Caddy's JSON access line nests the client IP as request.remote_ip, which
# appears before the top-level "status" field, so this ordered regex works.

[Definition]
failregex = "remote_ip":"<HOST>".*"status":401
ignoreregex =
datepattern = "ts":{EPOCH}

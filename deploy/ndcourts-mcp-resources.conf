# systemd drop-in — resource caps for ndcourts-mcp.service on a small
# droplet with a PUBLIC endpoint (ndlaw.org). The kernel throttles the
# service at MemoryHigh and kills it at MemoryMax; Restart=on-failure in
# the base unit brings it back in ~2s. This turns a pathological query
# burst into a brief service blip instead of a droplet-wide OOM.
#
# Install:
#   sudo mkdir -p /etc/systemd/system/ndcourts-mcp.service.d
#   sudo cp deploy/ndcourts-mcp-resources.conf \
#       /etc/systemd/system/ndcourts-mcp.service.d/resources.conf
#   sudo systemctl daemon-reload && sudo systemctl restart ndcourts-mcp
#
# Sizing (1 GiB droplet shared with Apache/DokuWiki): the app idles ~20 MB
# RSS; SQLite page cache + FTS scratch on the heaviest tools stays well
# under 200 MB. 300/450 leaves the wiki's prefork pool room to breathe.

[Service]
MemoryHigh=300M
MemoryMax=450M
TasksMax=64
